<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#1e3a8a',accent:'#34d399'},boxShadow:{soft:'0 6px 16px rgba(0,0,0,.06)'}}}}}</script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
<header class="bg-white sticky top-0 z-30 shadow">
  <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between">
    <a href="index2.html" class="flex items-center text-2xl md:text-3xl font-extrabold text-primary">
      <i data-lucide="book-open" class="w-8 h-8 mr-2 text-accent"></i>
      Scriptorium Books
    </a>
    <div class="hidden md:flex items-center space-x-3">
      <a class="px-3 py-2 rounded-lg border" href="index2.html">Home</a>
    </div>
  </div>
</header>
<main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
  <div class="flex items-center justify-between mb-6">
    <h2 id="title" class="text-2xl md:text-3xl font-bold">Category</h2>
    <select class="px-3 py-2 rounded-lg border border-gray-200 text-sm">
      <option>Sort by: Popular</option>
      <option>Sort by: Newest</option>
      <option>Price: Low to High</option>
      <option>Price: High to Low</option>
    </select>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="grid"></div>
</main>
<script>
const params=new URLSearchParams(location.search);const cat=params.get('category')||'';
const PRODUCT_IMAGE='https://images.unsplash.com/photo-1517770413964-df8ca61194a6?ixid=M3w4MjcwNjd8MHwxfHNlYXJjaHw3fHxib29rfGVufDB8fHx8MTc2NDI2MjYxN3ww&ixlib=rb-4.1.0&fit=max&q=80';
const mockProducts=[
 {id:1,name:'The Midnight Library',author:'Matt Haig',price:19.99,category:'Fiction'},
 {id:2,name:'A Court of Thorns and Roses',author:'Sarah J. Maas',price:17.5,category:'Fantasy'},
 {id:3,name:'The Silent Patient',author:'Alex Michaelides',price:14.99,category:'Mystery'},
 {id:4,name:'The Love Hypothesis',author:'Ali Hazelwood',price:16.99,category:'Romance'},
 {id:5,name:'Becoming',author:'Michelle Obama',price:21.0,category:'Biography'},
 {id:6,name:'Sapiens',author:'Yuval Noah Harari',price:18.99,category:'History'}
];
const formatCurrency=(a)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(a);
document.getElementById('title').textContent=cat?cat:'All Books';
const items=mockProducts.filter(p=>!cat||p.category===cat);
document.getElementById('grid').innerHTML=items.map(p=>`
<div class="bg-white rounded-2xl shadow-soft overflow-hidden flex flex-col">
  <div class="aspect-[3/4] overflow-hidden"><img src="${PRODUCT_IMAGE}" alt="${p.name}" class="w-full h-full object-cover" loading="lazy" decoding="async"></div>
  <div class="p-5 flex flex-col flex-grow">
    <h3 class="text-lg font-bold">${p.name}</h3>
    <p class="text-sm text-gray-600 mt-1">${p.author}</p>
    <div class="mt-auto pt-3 flex items-center justify-between border-t border-gray-100">
      <span class="text-xl font-extrabold text-primary">${formatCurrency(p.price)}</span>
      <div class="flex gap-2">
        <a href="product.html?id=${p.id}" class="px-3 py-2 rounded-lg border border-gray-200 text-sm">Details</a>
      </div>
    </div>
  </div>
</div>`).join('');
lucide.createIcons();
</script>
</body>
</html>
